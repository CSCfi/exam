pre-commit:
  commands:
    prettier:
      tags: frontend style
      glob: "**/*.{ts,html}"
      run: pnpm exec prettier --write {staged_files}
    scalafmt:
      tags: backend style / scala format
      glob: "**/*.scala"
      run: scalafmt {staged_files}
    eslint:
      tags: frontend rules
      glob: "**/*.ts"
      run: pnpm exec eslint --fix {staged_files}
