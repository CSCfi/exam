<!DOCTYPE html>
<html ng-app="app" lang="en">
    <head>
        <title>Exam</title>

            <!-- To ensure proper mobile rendering and touch zooming -->
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta charset="utf-8">
            <!-- IE11 - angular compatibility test -->
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

        <link rel="shortcut icon" type="img/png" href="@routes.Assets.at("assets/images/favicon.ico?v=hy")">

            <!-- Customized libraries, not directly usable with npm/webpack -->
        <script src="@routes.Assets.at("components/vendor/ckeditor/ckeditor.js")" type="text/javascript"></script>
        <script src="@routes.Assets.at("components/vendor/MathJax-2.6-latest/MathJax.js?config=TeX-AMS_HTML")"
            type="text/javascript">
        </script>
        <script>
                if (window.CKEDITOR) {
                    CKEDITOR.env.isCompatible = true;
                    CKEDITOR.cacheForceReload = Date.now();
                    CKEDITOR.on('dialogDefinition', function (ev) {
                        <!-- links to have a default target of '_blank' -->
                        if (ev.data.name === 'link') {
                            var def = ev.data.definition;
                            def.removeContents('advanced');
                            var field = def.getContents('target').get('linkTargetType');
                            field['default'] = '_blank';
                        }
                    });
                }
        </script>

            <!-- The bundle -->
        <script defer type="text/javascript" src="/bundles/app.bundle.js" charset="utf-8"></script>

    </head>

    <body>
        <session>
        </session>
    </body>

</html>
