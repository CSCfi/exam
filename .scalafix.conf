rules = [DisableSyntax, OrganizeImports, RedundantSyntax, NoValInForComprehension]
DisableSyntax {
  noVars = false # because of Java interop and tests
  noReturns = true
  noNulls = false # because of Java interop
}
OrganizeImports {
  removeUnused = true
  groupedImports = Keep
  coalesceToWildcardImportThreshold = 3
  targetDialect = Scala3
}
