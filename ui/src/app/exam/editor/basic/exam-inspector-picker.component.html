<div class="row mt-3">
    <div class="col-md-3">
        {{ 'i18n_exam_instructor' | translate }}
        <sup
            ngbPopover="{{ 'i18n_exam_instructor_description' | translate }}"
            popoverTitle="{{ 'i18n_instructions' | translate }}"
            triggers="mouseenter:mouseleave"
            ><img src="/assets/images/icon_tooltip.svg" alt=""
        /></sup>
    </div>
    <div class="col-md-5">
        <input
            type="text"
            class="form-control"
            [(ngModel)]="inspectorName"
            [ngbTypeahead]="listInspectors$"
            (selectItem)="setInspector($event)"
            [inputFormatter]="nameFormatter"
            [resultFormatter]="nameFormatter"
            placeholder="{{ 'i18n_name' | translate }}"
        />
    </div>
    <div class="col-md-4 d-flex align-items-center">
        <label class="mb-0">
            <input
                type="checkbox"
                [checked]="newInspector().sendMessage"
                (change)="onSendMessageChange($event)"
                [disabled]="!newInspector().id"
            />
            <span class="ps-1">{{ 'i18n_write_message' | translate }}</span>
        </label>
    </div>
</div>
<div class="row mt-2">
    <div class="col-md-5 offset-md-3">
        <textarea
            class="form-control"
            placeholder="{{ 'i18n_message' | translate }}"
            [value]="newInspector().comment || ''"
            (input)="onCommentInput($event)"
            [disabled]="!newInspector().sendMessage"
        ></textarea>
    </div>
    <div class="col-md-4 d-flex align-items-end pb-1">
        <button (click)="addInspector()" class="btn btn-success">
            {{ 'i18n_add' | translate }}
        </button>
    </div>
</div>
<div class="row">
    <div class="col-md-5 offset-md-3">
        @for (inspection of examInspections(); track inspection) {
            <div class="d-flex align-items-center justify-content-between mt-2">
                <small>
                    {{ inspection.user.firstName }} {{ inspection.user.lastName }} ({{ inspection.user.email }})
                </small>
                <button
                    class="btn btn-outline-danger btn-sm ms-3 flex-shrink-0"
                    (click)="removeInspector(inspection.id)"
                    [ariaLabel]="inspection.user.firstName + ' ' + inspection.user.lastName"
                >
                    {{ 'i18n_remove' | translate }}
                </button>
            </div>
        }
    </div>
</div>
